name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mrbart3885/risuai-nodeonly

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.slug.outputs.pair }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.slug.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MINOR="${VERSION%.*}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        run: |
          TAGS=""
          if [[ "${{ steps.version.outputs.is_tag }}" == "true" ]]; then
            TAGS="-t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            TAGS="$TAGS -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}"
            TAGS="$TAGS -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.minor }}"
          else
            TAGS="-t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          fi
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  cleanup-old-images:
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete orphaned untagged versions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'mrbart3885';
            const pkg = 'risuai-nodeonly';

            // 1. Get all package versions
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              { package_type: 'container', package_name: pkg, username: owner, per_page: 100 }
            );

            // 2. Get ghcr.io auth token
            const tokenResp = await fetch(
              `https://ghcr.io/token?scope=repository:${owner}/${pkg}:pull`
            );
            const { token } = await tokenResp.json();

            // 3. Collect digests referenced by tagged manifest lists
            const referencedDigests = new Set();
            for (const v of versions) {
              if (v.metadata?.container?.tags?.length > 0) {
                try {
                  const resp = await fetch(
                    `https://ghcr.io/v2/${owner}/${pkg}/manifests/${v.name}`,
                    {
                      headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json'
                      }
                    }
                  );
                  if (resp.ok) {
                    const manifest = await resp.json();
                    if (manifest.manifests) {
                      for (const m of manifest.manifests) {
                        referencedDigests.add(m.digest);
                      }
                    }
                  }
                } catch (e) {
                  core.warning(`Failed to fetch manifest for ${v.name}: ${e.message}`);
                }
              }
            }
            core.info(`Referenced digests: ${referencedDigests.size}`);

            // 4. Delete untagged versions NOT referenced by any manifest list
            const untagged = versions
              .filter(v => !v.metadata?.container?.tags?.length)
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            let deleted = 0;
            for (const v of untagged) {
              if (referencedDigests.has(v.name)) {
                core.info(`KEEP ${v.name.slice(0, 20)}... (referenced)`);
                continue;
              }
              core.info(`DELETE ${v.name.slice(0, 20)}... (orphaned)`);
              try {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  package_version_id: v.id
                });
                deleted++;
              } catch (e) {
                core.warning(`Failed to delete ${v.id}: ${e.message}`);
              }
            }
            core.info(`Cleanup done: deleted ${deleted} orphaned versions, kept ${untagged.length - deleted} referenced`);
