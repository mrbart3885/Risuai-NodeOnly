name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rsnd-risuai-nodeonly
  DOCKER_PLATFORMS: ${{ vars.DOCKER_PLATFORMS || 'linux/amd64' }}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.slug.outputs.pair }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.slug.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MINOR="${VERSION%.*}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        run: |
          TAGS=""
          if [[ "${{ steps.version.outputs.is_tag }}" == "true" ]]; then
            TAGS="-t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            TAGS="$TAGS -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}"
            TAGS="$TAGS -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.minor }}"
          else
            TAGS="-t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          fi
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  deploy-production:
    needs: merge
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: secrets
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          missing=0
          for name in DEPLOY_WEBHOOK_URL DEPLOY_WEBHOOK_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::warning title=Deploy skipped::$name is not configured"
              missing=1
            fi
          done

          if [ -z "$CF_ACCESS_CLIENT_ID" ] || [ -z "$CF_ACCESS_CLIENT_SECRET" ]; then
            echo "::warning title=Deploy without Cloudflare Access::CF_ACCESS_CLIENT_ID/CF_ACCESS_CLIENT_SECRET not configured"
          fi

          if [ "$missing" -eq 1 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DISCORD_DEPLOY_WEBHOOK_URL" ]; then
            echo "has_discord=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_discord=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger production deploy
        if: steps.secrets.outputs.skip != 'true'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          headers=(-H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN")

          if [ -n "$CF_ACCESS_CLIENT_ID" ] && [ -n "$CF_ACCESS_CLIENT_SECRET" ]; then
            headers+=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID")
            headers+=(-H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET")
          fi

          curl --retry 5 --retry-delay 2 --retry-connrefused \
            -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            "${headers[@]}"

      - name: Notify Discord on deploy success
        if: success() && steps.secrets.outputs.skip != 'true' && steps.secrets.outputs.has_discord == 'true'
        continue-on-error: true
        env:
          DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          python - <<'PY' > payload.json
          import json
          import os

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"][:7]
          actor = os.environ["GITHUB_ACTOR"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          payload = {
              "content": (
                  f"Deploy webhook completed for `{repo}` on `main`.\n"
                  f"Commit: `{sha}` by `{actor}`\n"
                  f"Run: {run_url}"
              )
          }

          print(json.dumps(payload))
          PY

          curl -fsS -H "Content-Type: application/json" \
            -X POST "$DISCORD_DEPLOY_WEBHOOK_URL" \
            --data @payload.json

      - name: Notify Discord on deploy failure
        if: failure() && steps.secrets.outputs.skip != 'true' && steps.secrets.outputs.has_discord == 'true'
        continue-on-error: true
        env:
          DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          python - <<'PY' > payload.json
          import json
          import os

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"][:7]
          actor = os.environ["GITHUB_ACTOR"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          payload = {
              "content": (
                  f"Deploy webhook failed for `{repo}` on `main`.\n"
                  f"Commit: `{sha}` by `{actor}`\n"
                  f"Run: {run_url}"
              )
          }

          print(json.dumps(payload))
          PY

          curl -fsS -H "Content-Type: application/json" \
            -X POST "$DISCORD_DEPLOY_WEBHOOK_URL" \
            --data @payload.json

  cleanup-old-images:
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete orphaned untagged versions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const pkg = 'rsnd-risuai-nodeonly';

            // 1. Get all package versions
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              { package_type: 'container', package_name: pkg, username: owner, per_page: 100 }
            );

            const tagged = versions.filter(v => v.metadata?.container?.tags?.length > 0);
            const untagged = versions.filter(v => !v.metadata?.container?.tags?.length);
            core.info(`Total: ${versions.length} versions (${tagged.length} tagged, ${untagged.length} untagged)`);

            if (tagged.length === 0) {
              core.warning('No tagged versions found — aborting cleanup');
              return;
            }

            // 2. Get ghcr.io auth token (Basic auth for private support)
            let token;
            try {
              const basicAuth = Buffer.from(`${owner}:${process.env.GITHUB_TOKEN}`).toString('base64');
              const tokenResp = await fetch(
                `https://ghcr.io/token?scope=repository:${owner}/${pkg}:pull`,
                { headers: { 'Authorization': `Basic ${basicAuth}` } }
              );
              if (!tokenResp.ok) throw new Error(`token endpoint returned ${tokenResp.status}`);
              token = (await tokenResp.json()).token;
            } catch (e) {
              core.error(`Failed to get ghcr.io token: ${e.message} — aborting cleanup`);
              return;
            }

            // 3. Collect digests referenced by tagged manifest lists
            const referencedDigests = new Set();
            let fetchFailures = 0;
            const acceptHeader = [
              'application/vnd.oci.image.index.v1+json',
              'application/vnd.docker.distribution.manifest.list.v2+json',
              'application/vnd.oci.image.manifest.v1+json',
              'application/vnd.docker.distribution.manifest.v2+json'
            ].join(',');
            for (const v of tagged) {
              try {
                const resp = await fetch(
                  `https://ghcr.io/v2/${owner}/${pkg}/manifests/${v.name}`,
                  { headers: { 'Authorization': `Bearer ${token}`, 'Accept': acceptHeader } }
                );
                if (!resp.ok) {
                  fetchFailures++;
                  core.warning(`Manifest fetch failed for ${v.metadata.container.tags}: HTTP ${resp.status}`);
                  continue;
                }
                const manifest = await resp.json();
                // manifest list → collect child digests; single manifest → no children
                if (manifest.manifests) {
                  for (const m of manifest.manifests) {
                    referencedDigests.add(m.digest);
                  }
                }
              } catch (e) {
                fetchFailures++;
                core.warning(`Manifest fetch error for ${v.name}: ${e.message}`);
              }
            }
            core.info(`Referenced digests: ${referencedDigests.size}, fetch failures: ${fetchFailures}`);

            // 4. Safety: abort if ANY manifest list fetch failed
            if (fetchFailures > 0) {
              core.error(`${fetchFailures} manifest fetch(es) failed — aborting to prevent data loss`);
              return;
            }
            if (referencedDigests.size === 0) {
              core.info('No multi-platform manifests found — nothing to clean up');
              return;
            }

            // 5. Delete untagged versions NOT referenced by any manifest list
            const orphaned = untagged.filter(v => !referencedDigests.has(v.name));
            core.info(`Orphaned: ${orphaned.length}, Referenced: ${untagged.length - orphaned.length}`);

            let deleted = 0;
            for (const v of orphaned) {
              core.info(`DELETE ${v.name.substring(0, 27)}...`);
              try {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  package_version_id: v.id
                });
                deleted++;
              } catch (e) {
                core.warning(`Failed to delete ${v.id}: ${e.message}`);
              }
            }
            core.info(`Cleanup done: deleted ${deleted} orphaned versions`);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
