name: Create GitHub Release with Portable Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            dist/
            server/
            package.json
            pnpm-lock.yaml
            update.sh
          retention-days: 1

  portable:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: portable/

      - name: Install production dependencies
        shell: bash
        run: |
          cd portable
          echo "node-linker=hoisted" > .npmrc
          pnpm install --prod --frozen-lockfile

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node.zip
          unzip -q node.zip
          cp "node-v${NODE_VERSION}-win-x64/node.exe" portable/bin/node.exe

      - name: Download Node.js binary (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o node.tar.xz
          tar -xJf node.tar.xz
          cp "node-v${NODE_VERSION}-linux-x64/bin/node" portable/bin/node
          chmod +x portable/bin/node

      - name: Download Node.js binary (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -o node.tar.gz
          tar -xzf node.tar.gz
          cp "node-v${NODE_VERSION}-darwin-arm64/bin/node" portable/bin/node
          chmod +x portable/bin/node

      - name: Add launcher scripts (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          printf '@echo off\r\nsetlocal\r\ntitle RisuAI NodeOnly\r\nset PORT=6001\r\nstart "" "http://localhost:%%PORT%%"\r\n"%%~dp0bin\\node.exe" "%%~dp0server\\node\\server.cjs"\r\npause\r\n' > portable/RisuAI.bat
          printf '@echo off\r\n"%%~dp0bin\\node.exe" "%%~dp0scripts\\updater.cjs"\r\npause\r\n' > portable/update.bat

      - name: Add launcher scripts (Unix)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          cat > portable/start.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          PORT="${PORT:-6001}"
          if command -v xdg-open >/dev/null 2>&1; then
              xdg-open "http://localhost:$PORT" 2>/dev/null &
          elif command -v open >/dev/null 2>&1; then
              open "http://localhost:$PORT" 2>/dev/null &
          fi
          bin/node server/node/server.cjs
          EOF
          cat > portable/update.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          bin/node scripts/updater.cjs
          EOF
          chmod +x portable/start.sh portable/update.sh

      - name: Add updater script
        shell: bash
        run: |
          mkdir -p portable/scripts
          cp scripts/updater.cjs portable/scripts/updater.cjs 2>/dev/null || true

      - name: Package portable (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="RisuAI-NodeOnly-v${VERSION}-win-x64"
          cd portable
          7z a -tzip "../${NAME}.zip" .

      - name: Package portable (Unix)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="RisuAI-NodeOnly-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          mv portable "$NAME"
          tar -czf "${NAME}.tar.gz" "$NAME"
          rm -rf "$NAME"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.platform }}-${{ matrix.arch }}
          path: RisuAI-NodeOnly-*
          retention-days: 1

  release:
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all portable artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: portable-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: RisuAI-NodeOnly-*
